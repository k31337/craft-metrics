<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="34%" r="65%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Unifying card so the mark reads on any background -->
  <rect x="50" y="30" width="800" height="440" rx="20" fill="#0d0f10" stroke="#232326" stroke-width="2"/>
  <rect x="50" y="30" width="800" height="440" rx="20" fill="url(#bgGlow)"/>

  <!-- dashboard card -->
  <g filter="url(#softShadow)">
    <rect x="90" y="70" width="720" height="290" rx="16" fill="#141618" stroke="#262a2c" stroke-width="2"/>

    <!-- panel grid -->
    <g stroke="#202426" stroke-width="1">
      <line x1="130" y1="150" x2="770" y2="150"/>
      <line x1="130" y1="200" x2="770" y2="200"/>
      <line x1="130" y1="250" x2="770" y2="250"/>
      <line x1="130" y1="300" x2="770" y2="300"/>
    </g>

    <!-- blocky terrain bars (dirt + grass cap), rising left to right -->
    <g>
      <rect x="140" y="250" width="42" height="70" fill="#6b4a2e"/>
      <rect x="140" y="238" width="42" height="12" fill="#5b8a3a"/>

      <rect x="182" y="215" width="42" height="105" fill="#6b4a2e"/>
      <rect x="182" y="203" width="42" height="12" fill="#5b8a3a"/>

      <rect x="224" y="260" width="42" height="60" fill="#6b4a2e"/>
      <rect x="224" y="248" width="42" height="12" fill="#5b8a3a"/>

      <rect x="266" y="175" width="42" height="145" fill="#6b4a2e"/>
      <rect x="266" y="163" width="42" height="12" fill="#5b8a3a"/>

      <rect x="308" y="195" width="42" height="125" fill="#6b4a2e"/>
      <rect x="308" y="183" width="42" height="12" fill="#5b8a3a"/>

      <rect x="350" y="135" width="42" height="185" fill="#6b4a2e"/>
      <rect x="350" y="123" width="42" height="12" fill="#5b8a3a"/>

      <rect x="392" y="220" width="42" height="100" fill="#6b4a2e"/>
      <rect x="392" y="208" width="42" height="12" fill="#5b8a3a"/>

      <rect x="434" y="155" width="42" height="165" fill="#6b4a2e"/>
      <rect x="434" y="143" width="42" height="12" fill="#5b8a3a"/>

      <rect x="476" y="105" width="42" height="215" fill="#6b4a2e"/>
      <rect x="476" y="93" width="42" height="12" fill="#5b8a3a"/>

      <rect x="518" y="185" width="42" height="135" fill="#6b4a2e"/>
      <rect x="518" y="173" width="42" height="12" fill="#5b8a3a"/>

      <rect x="560" y="120" width="42" height="200" fill="#6b4a2e"/>
      <rect x="560" y="108" width="42" height="12" fill="#5b8a3a"/>

      <rect x="602" y="80" width="42" height="240" fill="#6b4a2e"/>
      <rect x="602" y="68" width="42" height="12" fill="#5b8a3a"/>

      <rect x="644" y="150" width="42" height="170" fill="#6b4a2e"/>
      <rect x="644" y="138" width="42" height="12" fill="#5b8a3a"/>

      <rect x="686" y="95" width="42" height="225" fill="#6b4a2e"/>
      <rect x="686" y="83" width="42" height="12" fill="#5b8a3a"/>
    </g>

    <!-- Grafana-orange live line tracing the peaks -->
    <polyline points="161,238 203,197 245,242 287,157 329,177 371,117 413,202 455,137 497,87 539,167 581,102 623,62 665,132 707,77"
              fill="none" stroke="#f5a623" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
    <g fill="#f5a623">
      <circle cx="707" cy="77" r="5"/>
      <circle cx="707" cy="77" r="10" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.5">
        <animate attributeName="r" values="8;14;8" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <text x="450" y="420" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="46" font-weight="700" fill="#f2f2f4" letter-spacing="1">craft-metrics</text>
  <text x="450" y="452" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="15" fill="#8a8a90" letter-spacing="3">MINECRAFT GAMEPLAY, LIVE IN GRAFANA</text>
</svg>
